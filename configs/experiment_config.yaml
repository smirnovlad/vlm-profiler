models:
  - llava-hf/llava-1.5-7b-hf
  - llava-hf/llava-1.5-13b-hf
  - Salesforce/blip2-opt-2.7b
  - Salesforce/instructblip-vicuna-7b
  - Salesforce/instructblip-flan-t5-xl
  - Salesforce/blip2-flan-t5-xl
  - adept/fuyu-8b
  - HuggingFaceM4/idefics2-8b

datasets:
  - name: scienceqa
    source: derek-thomas/ScienceQA
    split: validation
    num_samples: 300
  - name: textvqa
    source: textvqa
    split: validation
    num_samples: 300
  - name: coco_caption
    source: HuggingFace/coco_captions
    split: validation
    num_samples: 300

# Baseline config: the "default" values when varying other axes
baseline:
  resolution: 224
  prompt_length: 10
  batch_size: 1
  optimization: none
  device: cuda

# Full set of values to sweep (one axis at a time)
scaling:
  resolutions: [224, 336, 448, 512]
  prompt_lengths: [10, 50, 100, 200]
  devices: ["cuda", "cpu"]
  optimizations: ["none", "fp16", "torch_compile"]
  batch_sizes: [1, 2, 4, 8]

profiling:
  warmup_runs: 3
  timed_runs: 10

# Experiment design: vary-one-axis
# Per model per dataset, this generates ~15 experiments:
#   1 baseline (quality + flops + latency + energy)
#   3 extra resolutions (latency + energy only)
#   3 extra prompt lengths
#   3 extra batch sizes
#   2 extra optimizations (fp16, torch_compile)
#   1 CPU baseline
# Total: ~15 per model per dataset = ~360 experiments for 8 models x 3 datasets
